<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giriş Yap — Günbatımı Kulübü</title>
<style>
  :root {
    --bg: #14110b;
    --paper: #241c14;
    --ink: #f5e6c8;
    --ink-soft: #b99e78;
    --accent: #e2622b;
    --accent-2: #e8a93d;
    --teal: #4fada6;
    --rose: #c1555b;
    --line: rgba(245, 230, 200, 0.14);
    color-scheme: dark;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
  }

  body {
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .stage {
    display: grid;
    grid-template-columns: minmax(320px, 46%) 1fr;
    width: 100%;
    min-height: 100vh;
  }

  @media (max-width: 860px) {
    .stage { grid-template-columns: 1fr; }
  }

  .stage[hidden] { display: none; }

  /* ---------- Photo scene ---------- */
  .scene {
    position: relative;
    overflow: hidden;
    min-height: 320px;
    background: #12100a;
  }

  .scene-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }

  .scene::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(18, 16, 10, 0.72) 0%,
      rgba(18, 16, 10, 0.25) 32%,
      rgba(18, 16, 10, 0.15) 55%,
      rgba(18, 16, 10, 0.75) 100%
    );
    pointer-events: none;
  }

  .scene-copy {
    position: absolute;
    left: 0;
    right: 0;
    top: 9%;
    text-align: center;
    padding: 0 1.5rem;
    z-index: 1;
  }

  .scene-eyebrow {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--accent-2);
    opacity: 0.9;
  }

  .scene-title {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: clamp(2.1rem, 5vw, 3.1rem);
    letter-spacing: 0.03em;
    margin: 0.5rem 0 0.4rem;
    color: #fff8e9;
    text-wrap: balance;
  }

  .scene-sub {
    font-style: italic;
    font-size: 1.05rem;
    color: #f0e2c4;
    opacity: 0.9;
  }

  .scene-caption {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 8%;
    z-index: 1;
    text-align: center;
    padding: 0 1.5rem;
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-2);
  }

  /* ---------- Form side ---------- */
  .form-side {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    background: var(--bg);
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 2.5rem 2.25rem 2rem;
    box-shadow: 6px 6px 0 var(--accent), 6px 6px 0 1px var(--line);
  }

  .card-heading {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: 1.7rem;
    letter-spacing: 0.01em;
    margin: 0 0 0.35rem;
  }

  .card-lede {
    margin: 0 0 1.9rem;
    color: var(--ink-soft);
    font-size: 0.98rem;
  }

  form { display: flex; flex-direction: column; gap: 1.35rem; }

  .field { display: flex; flex-direction: column; gap: 0.4rem; }

  .field label {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .field input {
    font: inherit;
    font-size: 1.02rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--line);
    padding: 0.45rem 0.1rem;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .field input::placeholder { color: var(--ink-soft); opacity: 0.55; }

  .field input:focus {
    border-bottom-color: var(--accent);
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.88rem;
    color: var(--ink-soft);
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .remember input {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
  }

  a {
    color: var(--teal);
    text-decoration: underline;
    text-decoration-color: var(--line);
    text-underline-offset: 3px;
  }

  a:hover { text-decoration-color: currentColor; }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .submit {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: 0.92rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff8e9;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .submit:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }

  .submit:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--ink-soft);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0.15rem 0;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .signup {
    text-align: center;
    font-size: 0.92rem;
    color: var(--ink-soft);
    margin-top: 0.2rem;
  }

  .form-error {
    margin: -0.6rem 0 0;
    font-size: 0.85rem;
    color: var(--rose);
  }

  .welcome {
    text-align: center;
    padding: 1rem 0;
  }

  .welcome-heading {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: 1.7rem;
    margin: 0 0 0.5rem;
  }

  .welcome-lede {
    color: var(--ink-soft);
    font-size: 0.98rem;
    margin: 0;
  }

  /* ---------- Gallery ---------- */
  .gallery {
    width: 100%;
    min-height: 100vh;
    padding: 4rem 1.5rem 5rem;
    text-align: center;
  }

  .gallery-eyebrow {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--accent-2);
  }

  .gallery-title {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: clamp(1.9rem, 4vw, 2.7rem);
    margin: 0.5rem 0 3rem;
    text-wrap: balance;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1.5rem;
    max-width: 980px;
    margin: 0 auto;
  }

  .tile {
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--ink);
    box-shadow: 5px 5px 0 var(--line);
    transition: transform 0.15s ease;
  }

  .gallery-grid .tile:nth-child(odd) { transform: rotate(-2.5deg); }
  .gallery-grid .tile:nth-child(even) { transform: rotate(2.5deg); }
  .tile:hover { transform: rotate(0deg) scale(1.04); }

  .tile--futura {
    background: var(--accent);
    color: #fff8e9;
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: 2rem;
    letter-spacing: 0.02em;
  }

  .tile--script {
    background: var(--paper);
    color: var(--rose);
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
    font-size: 2.6rem;
  }

  .tile--mono {
    background: var(--teal);
    color: #0e2b2a;
    font-family: 'Courier New', monospace;
    font-size: 1.2rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .tile--stamp {
    background: var(--accent-2);
    color: #241c14;
    font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    font-size: 1.7rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .tile--outline {
    background: var(--bg);
    color: transparent;
    -webkit-text-stroke: 2px var(--accent-2);
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: 2.1rem;
  }

  .tile--animal { background: var(--paper); font-size: 3rem; }

  .emoji { display: inline-block; }

  @keyframes panda-bounce {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50% { transform: translateY(-14px) rotate(6deg); }
  }

  @keyframes frog-hop {
    0%, 100% { transform: translateY(0) scaleY(1); }
    25% { transform: translateY(-24px) scaleY(1.08); }
    50% { transform: translateY(0) scaleY(0.82); }
    70% { transform: translateY(-6px) scaleY(1.02); }
  }

  .panda-anim { animation: panda-bounce 1.7s ease-in-out infinite; }
  .frog-anim { animation: frog-hop 1.5s ease-in-out infinite; }

  @media (prefers-reduced-motion: reduce) {
    .submit { transition: none; }
    .panda-anim,
    .frog-anim { animation: none; }
  }
</style>
</head>
<body>

<div class="stage">
  <section class="scene">
    <img class="scene-photo" src="omer.jpg" alt="Ömer" />
    <div class="scene-copy">
      <p class="scene-eyebrow"></p>
      <h1 class="scene-title">Ömer Hoşgeldin</h1>
      <p class="scene-sub">Bu sayfa sana özel</p>
    </div>
    <p class="scene-caption">Daha fazlası için lütfen giriş yapın</p>
  </section>

  <section class="form-side">
    <div class="card">
      <h2 class="card-heading">Giriş Yap</h2>
      <p class="card-lede">Hesabına devam etmek için bilgilerini gir.</p>

      <form id="loginForm">
        <div class="field">
          <label for="email">E-posta</label>
          <input id="email" name="email" type="email" placeholder="sen@ornek.com" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="password">Şifre</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <p class="form-error" id="loginError" hidden>E-posta veya şifre hatalı.</p>

        <div class="row">
          <label class="remember">
            <input type="checkbox" name="remember" />
            Beni hatırla
          </label>
          <a href="#">Şifreni mi unuttun?</a>
        </div>

        <button class="submit" type="submit">Giriş Yap</button>

        <div class="divider">veya</div>

        <p class="signup">Hesabın yok mu? <a href="#">Kayıt ol</a></p>
      </form>
    </div>
  </section>
</div>

<section class="gallery" id="gallery" hidden>
  <p class="gallery-eyebrow">Hoş geldin, Ömer</p>
  <h2 class="gallery-title">Senin İçin Bir Galeri</h2>
  <div class="gallery-grid">
    <div class="tile tile--futura">Ömer</div>
    <div class="tile tile--animal"><span class="emoji panda-anim">🐼</span></div>
    <div class="tile tile--script">Ömer</div>
    <div class="tile tile--animal"><span class="emoji frog-anim">🐸</span></div>
    <div class="tile tile--mono">ÖMER</div>
    <div class="tile tile--stamp">Ömer</div>
    <div class="tile tile--animal"><span class="emoji panda-anim">🐼</span></div>
    <div class="tile tile--outline">Ömer</div>
    <div class="tile tile--animal"><span class="emoji frog-anim">🐸</span></div>
  </div>
</section>

<script>
  var VALID_EMAIL = 'omer.yazici@naholog.com';
  var VALID_PASSWORD = 'nahnah';

  document.getElementById('loginForm').addEventListener('submit', function (event) {
    event.preventDefault();

    var email = document.getElementById('email').value.trim().toLowerCase();
    var password = document.getElementById('password').value;
    var errorEl = document.getElementById('loginError');

    if (email === VALID_EMAIL && password === VALID_PASSWORD) {
      document.querySelector('.stage').hidden = true;
      document.getElementById('gallery').hidden = false;
    } else {
      errorEl.hidden = false;
    }
  });
</script>

</body>
</html>
