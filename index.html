<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Giriş Yap — Günbatımı Kulübü</title>
<style>
  :root {
    --bg: #f5e6c8;
    --paper: #fff8e9;
    --ink: #3b2417;
    --ink-soft: #6b4a34;
    --accent: #e2622b;
    --accent-2: #e8a93d;
    --teal: #1d6c66;
    --rose: #c1555b;
    --line: rgba(59, 36, 23, 0.18);
    color-scheme: light;
  }

  :root[data-theme="dark"] {
    --bg: #1b1830;
    --paper: #2a2340;
    --ink: #f5e6c8;
    --ink-soft: #d8c39c;
    --accent: #f0813f;
    --accent-2: #f0b84d;
    --teal: #5cbdb5;
    --rose: #e08a90;
    --line: rgba(245, 230, 200, 0.16);
  }

  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1b1830;
      --paper: #2a2340;
      --ink: #f5e6c8;
      --ink-soft: #d8c39c;
      --accent: #f0813f;
      --accent-2: #f0b84d;
      --teal: #5cbdb5;
      --rose: #e08a90;
      --line: rgba(245, 230, 200, 0.16);
    }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: Georgia, 'Iowan Old Style', 'Palatino Linotype', serif;
  }

  body {
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .stage {
    display: grid;
    grid-template-columns: minmax(320px, 46%) 1fr;
    width: 100%;
    min-height: 100vh;
  }

  @media (max-width: 860px) {
    .stage { grid-template-columns: 1fr; }
  }

  /* ---------- Photo scene ---------- */
  .scene {
    position: relative;
    overflow: hidden;
    min-height: 320px;
    background: #12100a;
  }

  .scene-photo {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }

  .scene::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(18, 16, 10, 0.72) 0%,
      rgba(18, 16, 10, 0.25) 32%,
      rgba(18, 16, 10, 0.15) 55%,
      rgba(18, 16, 10, 0.75) 100%
    );
    pointer-events: none;
  }

  .scene-copy {
    position: absolute;
    left: 0;
    right: 0;
    top: 9%;
    text-align: center;
    padding: 0 1.5rem;
    z-index: 1;
  }

  .scene-eyebrow {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--accent-2);
    opacity: 0.9;
  }

  .scene-title {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: clamp(2.1rem, 5vw, 3.1rem);
    letter-spacing: 0.03em;
    margin: 0.5rem 0 0.4rem;
    color: #fff8e9;
    text-wrap: balance;
  }

  .scene-sub {
    font-style: italic;
    font-size: 1.05rem;
    color: #f0e2c4;
    opacity: 0.9;
  }

  .scene-caption {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 8%;
    z-index: 1;
    text-align: center;
    padding: 0 1.5rem;
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent-2);
  }

  /* ---------- Form side ---------- */
  .form-side {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    background: var(--bg);
  }

  .card {
    width: 100%;
    max-width: 400px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 2.5rem 2.25rem 2rem;
    box-shadow: 6px 6px 0 var(--accent), 6px 6px 0 1px var(--line);
  }

  .card-heading {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: 1.7rem;
    letter-spacing: 0.01em;
    margin: 0 0 0.35rem;
  }

  .card-lede {
    margin: 0 0 1.9rem;
    color: var(--ink-soft);
    font-size: 0.98rem;
  }

  form { display: flex; flex-direction: column; gap: 1.35rem; }

  .field { display: flex; flex-direction: column; gap: 0.4rem; }

  .field label {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }

  .field input {
    font: inherit;
    font-size: 1.02rem;
    color: var(--ink);
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--line);
    padding: 0.45rem 0.1rem;
    outline: none;
    transition: border-color 0.15s ease;
  }

  .field input::placeholder { color: var(--ink-soft); opacity: 0.55; }

  .field input:focus {
    border-bottom-color: var(--accent);
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.88rem;
    color: var(--ink-soft);
  }

  .remember {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .remember input {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
  }

  a {
    color: var(--teal);
    text-decoration: underline;
    text-decoration-color: var(--line);
    text-underline-offset: 3px;
  }

  a:hover { text-decoration-color: currentColor; }

  a:focus-visible,
  button:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }

  .submit {
    font-family: Futura, 'Century Gothic', 'Avenir Next', sans-serif;
    font-weight: 700;
    font-size: 0.92rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #fff8e9;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .submit:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--ink);
  }

  .submit:active {
    transform: translate(1px, 1px);
    box-shadow: 2px 2px 0 var(--ink);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--ink-soft);
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0.15rem 0;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .signup {
    text-align: center;
    font-size: 0.92rem;
    color: var(--ink-soft);
    margin-top: 0.2rem;
  }

  @media (prefers-reduced-motion: reduce) {
    .submit { transition: none; }
  }
</style>
</head>
<body>

<div class="stage">
  <section class="scene">
    <img class="scene-photo" src="omer.jpg" alt="Ömer" />
    <div class="scene-copy">
      <p class="scene-eyebrow"></p>
      <h1 class="scene-title">Ömer Hoşgeldin</h1>
      <p class="scene-sub">Bu sayfa sana özel</p>
    </div>
    <p class="scene-caption">Daha fazlası için lütfen giriş yapın</p>
  </section>

  <section class="form-side">
    <div class="card">
      <h2 class="card-heading">Giriş Yap</h2>
      <p class="card-lede">Hesabına devam etmek için bilgilerini gir.</p>

      <form>
        <div class="field">
          <label for="email">E-posta</label>
          <input id="email" name="email" type="email" placeholder="sen@ornek.com" autocomplete="username" required />
        </div>

        <div class="field">
          <label for="password">Şifre</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>

        <div class="row">
          <label class="remember">
            <input type="checkbox" name="remember" />
            Beni hatırla
          </label>
          <a href="#">Şifreni mi unuttun?</a>
        </div>

        <button class="submit" type="submit">Giriş Yap</button>

        <div class="divider">veya</div>

        <p class="signup">Hesabın yok mu? <a href="#">Kayıt ol</a></p>
      </form>
    </div>
  </section>
</div>

</body>
</html>
